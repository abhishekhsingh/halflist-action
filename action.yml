name: 'halflist - MCP Server Testing'
description: 'Run conformance, security, and performance checks on MCP servers'
author: 'abhishekhsingh'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  command:
    description: 'Server command for stdio transport (e.g., "python3 my_server.py")'
    required: false
  url:
    description: 'Server URL for HTTP transport (e.g., "http://localhost:8000/mcp")'
    required: false
  mode:
    description: 'Halflist command to run: check, bench, audit'
    required: false
    default: 'check'
  args:
    description: 'Additional halflist CLI arguments (e.g., "--timeout 60 --verbose")'
    required: false
    default: ''
  version:
    description: 'mcp-halflist version to install (e.g., "1.0.0"). Defaults to latest.'
    required: false
    default: ''
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  junit:
    description: 'Generate JUnit XML report (true/false)'
    required: false
    default: 'false'
  args-file:
    description: 'Path to custom tool arguments JSON file'
    required: false
    default: ''
  config:
    description: 'Path to halflist.toml config file'
    required: false
    default: ''
  fail-on-warn:
    description: 'Fail the action if warnings are found'
    required: false
    default: 'false'

outputs:
  score:
    description: 'Server conformance score (0-100)'
    value: ${{ steps.run.outputs.score }}
  result:
    description: 'pass or fail'
    value: ${{ steps.run.outputs.result }}
  report:
    description: 'Path to JUnit XML report (if junit=true)'
    value: ${{ steps.run.outputs.report }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install mcp-halflist
      shell: bash
      env:
        HALFLIST_VERSION: ${{ inputs.version }}
      run: |
        if [ -n "$HALFLIST_VERSION" ]; then
          pip install "mcp-halflist==$HALFLIST_VERSION"
        else
          pip install mcp-halflist
        fi

    - name: Run halflist
      id: run
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_URL: ${{ inputs.url }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_JUNIT: ${{ inputs.junit }}
        INPUT_ARGS_FILE: ${{ inputs.args-file }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_FAIL_ON_WARN: ${{ inputs.fail-on-warn }}
      run: |
        ARGS=("halflist" "$INPUT_MODE")

        if [ -n "$INPUT_COMMAND" ]; then
          ARGS+=("--stdio" "$INPUT_COMMAND")
        elif [ -n "$INPUT_URL" ]; then
          ARGS+=("--http" "$INPUT_URL")
        else
          echo "::error::Either 'command' (stdio) or 'url' (http) input is required"
          exit 1
        fi

        if [ -n "$INPUT_CONFIG" ]; then
          ARGS+=("--config" "$INPUT_CONFIG")
        fi

        if [ -n "$INPUT_ARGS_FILE" ]; then
          ARGS+=("--args-file" "$INPUT_ARGS_FILE")
        fi

        NEED_JSON="false"
        if [ "$INPUT_JUNIT" = "true" ] || [ "$INPUT_FAIL_ON_WARN" = "true" ]; then
          NEED_JSON="true"
        fi

        EXIT_CODE=0

        if [ "$NEED_JSON" = "true" ]; then
          JSON_FILE=$(mktemp /tmp/halflist-XXXXXX.json)

          # Run with JSON output for structured parsing
          # $INPUT_ARGS is intentionally unquoted for word-splitting
          "${ARGS[@]}" --format json $INPUT_ARGS > "$JSON_FILE" || EXIT_CODE=$?

          SCORE=$(python3 -c "
        import json
        try:
            d = json.load(open('$JSON_FILE'))
            print(d.get('score', 0))
        except Exception:
            print(0)
        ")
          WARNED=$(python3 -c "
        import json
        try:
            d = json.load(open('$JSON_FILE'))
            print(d.get('total_warned', 0))
        except Exception:
            print(0)
        ")

          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

          if [ "$INPUT_JUNIT" = "true" ]; then
            JUNIT_PATH="halflist-results.xml"
            halflist report "$JSON_FILE" --format junit -o "$JUNIT_PATH" || true
            echo "report=$JUNIT_PATH" >> "$GITHUB_OUTPUT"
          fi

          echo "::notice::halflist score: $SCORE/100"

          if [ "$INPUT_FAIL_ON_WARN" = "true" ] && [ "$WARNED" -gt 0 ] && [ "$EXIT_CODE" -eq 0 ]; then
            echo "::warning::$WARNED warning(s) found and fail-on-warn is enabled"
            echo "result=fail" >> "$GITHUB_OUTPUT"
            rm -f "$JSON_FILE"
            exit 1
          fi

          rm -f "$JSON_FILE"
        else
          # Terminal output for CI logs
          "${ARGS[@]}" $INPUT_ARGS || EXIT_CODE=$?
        fi

        if [ "$EXIT_CODE" -eq 0 ]; then
          echo "result=pass" >> "$GITHUB_OUTPUT"
        else
          echo "result=fail" >> "$GITHUB_OUTPUT"
          exit "$EXIT_CODE"
        fi

    - name: Upload JUnit results
      if: inputs.junit == 'true' && always()
      uses: actions/upload-artifact@v4
      with:
        name: halflist-junit-results
        path: halflist-results.xml
        if-no-files-found: ignore
